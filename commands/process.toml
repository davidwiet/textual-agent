3. **Constraint:** Do not alter the core arguments or logical structure.

### PHASE 3: Supplementary Advisory (Parallel Metadata)
1. **Action:** Generate structural suggestions and conceptual anchors.
2. **Output:** Save results to `Output_Files/ADVISORY_LOG.md`.
