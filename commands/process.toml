description = "Execute the 'Perfect Combination' workflow: Chunking -> Polish -> Advisory."
prompt = """
Execute the full 3-pass 'Sovereign Scribe' protocol on the provided file.

### PHASE 1: Structured Chunking (Semantic Preservation)
1. **Action:** Run the Python orchestrator with the primary agent (e.g., Rewrite).
2. **Command:** `python3 ~/.gemini/extensions/textual-agent/scripts/auto_process.py --input <source_file> --agent ~/.gemini/extensions/textual-agent/Agents/<primary_agent>.txt --matrix StyleMatrix.json`
3. **Verification:** Ensure 1:1 logical node preservation and footnote integrity.

### PHASE 2: Mandate-Only Polish (Linguistic Elevation)
1. **Action:** Perform a surgical second pass on the *output* of Phase 1.
